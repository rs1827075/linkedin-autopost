name: Draft LinkedIn posts

on:
  schedule:
    - cron: "0 8 * * 1"  # every Monday 08:00 UTC - edit as you like
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify GEMINI_API_KEY is present
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY is EMPTY - add it under Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "GEMINI_API_KEY is set (length: ${#GEMINI_API_KEY})"

      - name: Find new items
        run: python scripts/fetch_sources.py

      - name: Draft posts with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/draft_post.py

      - name: Open a PR with the new drafts (if any)
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "New LinkedIn post draft(s)"
          title: "New LinkedIn post draft(s) for review"
          body: |
            Auto-drafted from new items in the tracked feeds.
            Review each file under `drafts/`, edit the post text, tick the
            reviewer checklist, add an image if you want one, then merge
            this PR to publish.
          branch: "drafts/auto-${{ github.run_id }}"
          add-paths: |
            drafts/*.md
            state/seen_items.json
